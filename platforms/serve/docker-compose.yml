services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pwdlock
      POSTGRES_USER: pwdlock
      POSTGRES_PASSWORD: pwdlock
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pwdlock -d pwdlock"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
